name: Build & attach CIV APKs to release

# TEMPLATE for CI-driven multi-version builds. When a GitHub release is published,
# build the plugin for every supported ATAK version (CIV distro), both debug and
# release, and upload the APKs as assets. Also runnable by hand against a tag.
#
# The ATAK SDK jars are licensed, so this needs them supplied via the
# ATAK_SDK_BUNDLE_URL secret (a URL to a .tar.gz of sdk/main-*.jar). Without it the
# job skips with a warning. This repository can't host the jars, so its own release
# APKs are attached directly instead — this workflow is here to show the pattern.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and attach APKs to (e.g. v1.0.0)
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-33" "build-tools;33.0.1"

      # ---------------------------------------------------------------------
      # The ATAK SDK jars (sdk/main-<version>.jar) are licensed and are NOT in
      # this repo. Provide them to CI via the ATAK_SDK_BUNDLE_URL secret: a URL
      # to a .tar.gz that, when extracted at the repo root, produces
      # sdk/main-4.10.0.jar ... sdk/main-5.8.0.jar (names per versions.json).
      # Obtain the per-version SDKs from the official ATAK-CIV releases (tak.gov).
      # ---------------------------------------------------------------------
      # If the SDK-jar secret isn't configured, skip the build steps gracefully
      # (a green run with a warning) rather than failing every release.
      - name: Check for SDK secret
        id: sdk
        env:
          ATAK_SDK_BUNDLE_URL: ${{ secrets.ATAK_SDK_BUNDLE_URL }}
        run: |
          if [ -z "${ATAK_SDK_BUNDLE_URL:-}" ]; then
            echo "::warning::ATAK_SDK_BUNDLE_URL secret not set — skipping APK build/upload. Set it (a tarball of sdk/main-*.jar) and re-run to attach APKs. See README -> Releases."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage ATAK SDK jars
        if: steps.sdk.outputs.present == 'true'
        env:
          ATAK_SDK_BUNDLE_URL: ${{ secrets.ATAK_SDK_BUNDLE_URL }}
        run: |
          set -euo pipefail
          curl -fsSL "$ATAK_SDK_BUNDLE_URL" -o /tmp/atak-sdk.tar.gz
          tar -xzf /tmp/atak-sdk.tar.gz -C .
          echo "Staged SDK jars:"; ls -1 sdk/main-*.jar
          # Every version in versions.json must have its jar.
          python3 - <<'PY'
          import json, os, sys
          missing = [v['jar'] for v in json.load(open('versions.json'))['versions']
                     if not os.path.isfile(os.path.join('sdk', v['jar']))]
          if missing:
              sys.exit("Missing SDK jars: " + ", ".join(missing))
          PY

      - name: Generate signing keystore
        if: steps.sdk.outputs.present == 'true'
        run: |
          set -euo pipefail
          mkdir -p keystore
          # TAK's well-known dev signing identity (matches app/build.gradle signingConfigs).
          keytool -genkeypair -v -keystore keystore/android_keystore \
            -alias wintec_mapping -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tnttnt -keypass tnttnt -dname "CN=Abstract-A-TAK"

      - name: Write local.properties
        if: steps.sdk.outputs.present == 'true'
        run: |
          {
            echo "sdk.dir=${ANDROID_SDK_ROOT}"
            echo "takdev.plugin=${GITHUB_WORKSPACE}/build-tools/atak-gradle-takdev.jar"
          } > local.properties

      - name: Build CIV debug + release (all versions)
        if: steps.sdk.outputs.present == 'true'
        run: |
          set -euo pipefail
          # Two flavor dimensions => no single assembleCivDebug task; build the
          # explicit per-version CIV tasks generated from versions.json.
          tasks=$(python3 -c "import json;print(' '.join(f'assemble{v[\"flavorId\"][0].upper()+v[\"flavorId\"][1:]}Civ{t}' for v in json.load(open('versions.json'))['versions'] for t in ('Debug','Release')))")
          echo "gradle tasks: $tasks"
          ./gradlew $tasks --no-daemon --console=plain

      - name: Collect and rename APKs
        if: steps.sdk.outputs.present == 'true'
        id: collect
        run: |
          set -euo pipefail
          mkdir -p dist
          python3 - <<'PY'
          import json, glob, os, shutil
          vers = {v['flavorId']: v['pluginApi'] for v in json.load(open('versions.json'))['versions']}
          for apk in glob.glob('app/build/outputs/apk/*Civ/*/*.apk'):
              parts = apk.split(os.sep)
              flavor = parts[-3]              # e.g. atak530Civ
              build_type = parts[-2]          # debug | release
              flavor_id = flavor[:-3]         # strip "Civ" -> atak530
              api = vers.get(flavor_id, flavor_id)
              dest = f"dist/Abstract-A-TAK-{api}-CIV-{build_type}.apk"
              shutil.copyfile(apk, dest)
              print("->", dest)
          PY
          echo "count=$(ls dist/*.apk | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Upload APKs to release
        if: steps.sdk.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Uploading ${{ steps.collect.outputs.count }} APKs to ${{ steps.tag.outputs.tag }}"
          gh release upload "${{ steps.tag.outputs.tag }}" dist/*.apk --clobber
